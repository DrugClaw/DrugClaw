services:
  drugclaw:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: drugclaw
    command: ["drugclaw", "start"]
    stdin_open: true
    tty: true
    init: true
    restart: unless-stopped
    volumes:
      - ./drugclaw.config.yaml:/app/drugclaw.config.yaml:ro
      # Default data_dir resolves to ~/.drugclaw; persist it on the host.
      - ./data:/home/drugclaw/.drugclaw
      - ./tmp:/app/tmp
    environment:
      - RUST_LOG=info
      - HOME=/home/drugclaw
    ports:
      - "127.0.0.1:10961:10961" # Uncomment and adjust if you plan to use DrugClaw's web UI
