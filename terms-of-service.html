      const i18nNodes = Array.from(document.querySelectorAll("[data-i18n]"));
      const langSelect = document.getElementById("langSelect");
      const metaDescription = document.getElementById("meta-description");

      function setLanguage(lang) {
        const dict = translations[lang] || translations.en;

        i18nNodes.forEach((node) => {
          const key = node.getAttribute("data-i18n");
          if (dict[key]) node.textContent = dict[key];
        });

        document.title = dict.page_title;
        if (metaDescription) metaDescription.content = dict.meta_description;
        document.documentElement.lang = lang;
        langSelect.value = lang;
        localStorage.setItem("drugclaw_lang", lang);
      }

      langSelect.addEventListener("change", (event) => {
        setLanguage(event.target.value);
      });

      const stored = localStorage.getItem("drugclaw_lang");
      const navLang = (navigator.language || "").toLowerCase();
      const initial =
        stored ||
        (navLang.includes("zh-tw") || navLang.includes("zh-hk") || navLang.includes("hant")
          ? "zh-TW"
          : navLang.includes("zh")
            ? "zh-CN"
            : "en");
      setLanguage(initial);
